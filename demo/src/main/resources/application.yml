server:
  port: 8080

serviceurl: http://localhost:5000/api/ai/chat
serviceurlstream: http://localhost:5000/api/ai/chat/stream

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/virtual_finance?characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 88888888
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1  # Redis 服务器的 IP 地址
      port: 6379       # Redis 的端口号

  jpa:
    # 在控制台打印 Hibernate 生成的 SQL 语句，方便我们排查 Bug
    show-sql: true
    hibernate:
      # none 表示不自动修改数据库表结构，因为我们已经用 SQL 脚本建好表了
      ddl-auto: none
    properties:
      hibernate:
        # 将打印出来的 SQL 语句格式化
        format_sql: true

# 自定义配置
market:
  api:
    connect-timeout: 5000 # 连接超时时间（毫秒）
    read-timeout: 10000   # 读取超时时间（毫秒）
